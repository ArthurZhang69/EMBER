<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EMBER — Earth Monitoring of Burn Exposure Risk</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e8e8e8; }
    header { padding: 2rem; text-align: center; background: #1a1d27; border-bottom: 1px solid #2a2d3a; }
    header img { width: 320px; margin-bottom: 1rem; }
    header p { color: #9a9ab0; font-size: 0.95rem; }
    .app-frame { width: 100%; height: 80vh; border: none; }
    footer { text-align: center; padding: 1.5rem; font-size: 0.8rem; color: #5a5a7a; }
    footer a { color: #7a7aaa; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <img src="../EMBER_LOGO.svg" alt="EMBER Logo" />
    <p>Earth Monitoring of Burn Exposure Risk &mdash; CASA0025 Group Project, UCL CASA</p>
  </header>

  <!-- Replace src with your published GEE App URL after deployment -->
  <iframe
    class="app-frame"
    src="[GEE_APP_URL_TO_BE_ADDED]"
    allowfullscreen>
  </iframe>

  <footer>
    <p>
      Built with <a href="https://earthengine.google.com" target="_blank">Google Earth Engine</a> &bull;
      <a href="https://github.com/ArthurZhang69/EMBER" target="_blank">GitHub</a> &bull;
      <a href="https://oballinger.github.io/CASA0025" target="_blank">CASA0025</a>
    </p>
  </footer>
</body>
</html>
